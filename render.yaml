services:
  - type: web
    name: spinner-net
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -e .
    startCommand: spinner-web --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_NO_CACHE_DIR
        value: "1"
